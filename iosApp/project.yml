name: GalleryIOS
options:
  bundleIdPrefix: com.ugot
  deploymentTarget:
    iOS: "17.0"
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.0.0
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: HBNVC7KCMH
targets:
  GalleryIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
    resources:
      - Resources
    info:
      path: Sources/GalleryIOS/Info.plist
      properties:
        CFBundleDisplayName: UGOT
        UILaunchScreen: {}
        GIDClientID: "133048024494-k34fhrbpp4isrnsvmgkkhso8jk0kl132.apps.googleusercontent.com"
        GIDServerClientID: "133048024494-v9q4qimam6cl70set38o8tdbj3mcr0ss.apps.googleusercontent.com"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "com.googleusercontent.apps.133048024494-k34fhrbpp4isrnsvmgkkhso8jk0kl132"
        NSCameraUsageDescription: "Use the camera to attach images to AI Chat."
        NSMicrophoneUsageDescription: "Use the microphone to record audio for AI Chat."
        NSPhotoLibraryUsageDescription: "Choose photos to attach to AI Chat."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ugot.galleryios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: "NO"
        SWIFT_OBJC_BRIDGING_HEADER: Sources/GalleryIOS/GalleryIOS-Bridging-Header.h
        CLANG_CXX_LANGUAGE_STANDARD: c++20
        CLANG_CXX_LIBRARY: libc++
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/Vendor/LiteRTLM"
        HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/Vendor/MailMCPRS/include"
        LIBRARY_SEARCH_PATHS: "$(inherited) $(SRCROOT)/Vendor/MailMCPRS/lib/$(PLATFORM_NAME)"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        # LiteRT-LM's concrete engine implementation is registered through a
        # static initializer inside the static LiteRTLM framework. Normal static
        # linking can drop that object because the app references only the C API
        # entry points, which leaves EngineFactory empty at runtime and produces
        # "Engine type not found". Force-load the selected XCFramework slice so
        # the engine registration object is linked and initialized.
        OTHER_LDFLAGS: "$(inherited) -lc++ -framework AVFAudio -framework AudioToolbox -framework GemmaModelConstraintProvider -lmail_mcp_rs_ios"
        "OTHER_LDFLAGS[sdk=iphoneos*]": "$(inherited) -Wl,-force_load,$(SRCROOT)/Vendor/LiteRTLM/LiteRTLM.xcframework/ios-arm64/LiteRTLM.framework/LiteRTLM"
        "OTHER_LDFLAGS[sdk=iphonesimulator*]": "$(inherited) -Wl,-force_load,$(SRCROOT)/Vendor/LiteRTLM/LiteRTLM.xcframework/ios-arm64-simulator/LiteRTLM.framework/LiteRTLM"
    dependencies:
      - framework: ../Android/src/shared/core/build/XCFrameworks/release/GallerySharedCore.xcframework
        embed: false
      - framework: Vendor/LiteRTLM/LiteRTLM.xcframework
        embed: false
      - framework: Vendor/LiteRTLM/GemmaModelConstraintProvider.xcframework
        embed: true
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: MarkdownUI
        product: MarkdownUI
    preBuildScripts:
      - name: Build LiteRT-LM iOS XCFrameworks
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT"
          ./scripts/build_litertlm_ios_frameworks.sh
      - name: Build GallerySharedCore XCFramework
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/.."
          ./Android/src/gradlew -p Android/src :shared:core:assembleGallerySharedCoreReleaseXCFramework
      - name: Build Embedded MailMCP Rust FFI
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT"
          ./scripts/build_mail_mcp_rs_ios.sh
    postCompileScripts:
      - name: Copy MCP Apps Host Shell
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          dest="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/MCPAppsHost"
          rm -rf "$dest"
          mkdir -p "$dest"
          cp "$SRCROOT/Resources/MCPAppsHost/host-shell.html" "$dest/"
          cp "$SRCROOT/Resources/MCPAppsHost/host-shell.js" "$dest/"
