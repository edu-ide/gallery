name: GalleryIOS
options:
  bundleIdPrefix: com.ugot
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
targets:
  GalleryIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
    resources:
      - Resources
    info:
      path: Sources/GalleryIOS/Info.plist
      properties:
        CFBundleDisplayName: Gallery iOS
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ugot.galleryios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: "NO"
    dependencies:
      - framework: ../Android/src/shared/core/build/XCFrameworks/release/GallerySharedCore.xcframework
        embed: false
    preBuildScripts:
      - name: Build GallerySharedCore XCFramework
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/.."
          ./Android/src/gradlew -p Android/src :shared:core:assembleGallerySharedCoreReleaseXCFramework
